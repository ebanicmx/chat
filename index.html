<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centro de Atención</title>

<style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: #eef2f7;
        margin: 0;
    }

    .container {
        max-width: 500px;
        margin: 20px auto;
        background: white;
        padding: 20px;
        border-radius: 16px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    }

    h2 {
        text-align: center;
        color: #1e40af;
        font-size: 20px;
    }

    .menu {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 15px;
    }

    .menu button {
        padding: 16px;
        border: none;
        border-radius: 12px;
        background: linear-gradient(135deg, #2563eb, #1e3a8a);
        color: white;
        font-size: 14px;
        cursor: pointer;
        font-weight: 500;
        transition: 0.2s;
    }

    .menu button:active {
        transform: scale(0.97);
    }

    .content {
        margin-top: 15px;
        padding: 15px;
        background: #f9fafb;
        border-radius: 10px;
        min-height: 100px;
        font-size: 14px;
        line-height: 1.5;
    }

    input, textarea {
        width: 100%;
        padding: 12px;
        margin-top: 10px;
        border-radius: 10px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    textarea {
        min-height: 80px;
    }

    .form-btn {
        margin-top: 12px;
        width: 100%;
        background: #2563eb;
        color: white;
        border: none;
        padding: 14px;
        border-radius: 10px;
        font-size: 14px;
        cursor: pointer;
    }

    /* 📱 Ajuste extra para pantallas pequeñas */
    @media (max-width: 480px) {
        .menu {
            grid-template-columns: 1fr;
        }

        h2 {
            font-size: 18px;
        }

        .container {
            margin: 10px;
            padding: 15px;
        }
    }

</style>
</head>

<body>

<div class="container">
    <h2>🛍️ Atención al Cliente</h2>

    <div class="menu">
        <button onclick="mostrar('cuenta')">👤 Mi cuenta</button>
        <button onclick="mostrar('pedidos')">📦 Pedidos</button>
        <button onclick="mostrar('promo')">🔥 Promociones</button>
        <button onclick="mostrar('costos')">🚚 Costos</button>
        <button onclick="mostrar('error')">⚠️ Reportar</button>
        <button onclick="mostrar('compra')">🛒 Compra</button>
        <button onclick="mostrar('cashback')">💰 Cashback</button>
    </div>

    <div class="content" id="contenido">
        Selecciona una opción 👆
    </div>
</div>

<script>
function mostrar(opcion) {
    let contenido = document.getElementById("contenido");

    switch(opcion) {

        case "cuenta":
            contenido.innerHTML = "👤 En tu cuenta encontrarás tus datos personales y el historial de pedidos.";
        break;

        case "pedidos":
            contenido.innerHTML = "📦 Consulta tus compras desde tu perfil de usuario.";
        break;

        case "promo":
            contenido.innerHTML = "🔥 Las promociones están disponibles en el menú principal.";
        break;

        case "costos":
            contenido.innerHTML = "🚚 Entregas por paquetería Casa Blanca CB sin costo ni compra mínima.";
        break;

        case "compra":
            contenido.innerHTML = "🛒 Todas tus compras están protegidas y garantizadas.";
        break;

        case "error":
            contenido.innerHTML = `
                ⚠️ Describe tu problema:
                <textarea placeholder="Escribe aquí..."></textarea>
                <button class="form-btn">Enviar reporte</button>
            `;
        break;

        case "cashback":
            contenido.innerHTML = `
                💰 Solicita cashback:
                <input type="text" placeholder="Nombre completo">
                <input type="email" placeholder="Correo electrónico">
                <input type="tel" placeholder="Teléfono">
                <button class="form-btn">Solicitar</button>
            `;
        break;
    }
}
</script>

</body>
</html>
