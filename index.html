<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Centro de Ayuda | Tienda Online</title>

<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #eef2f7;
        margin: 0;
    }

    .container {
        max-width: 650px;
        margin: 50px auto;
        background: #ffffff;
        padding: 25px;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h2 {
        text-align: center;
        color: #1e3a8a;
        margin-bottom: 20px;
    }

    .menu {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }

    .menu button {
        padding: 14px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(135deg, #2563eb, #1e40af);
        color: white;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.25s ease;
        font-weight: 500;
    }

    .menu button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(37,99,235,0.3);
    }

    .content {
        margin-top: 20px;
        padding: 18px;
        background: #f9fafb;
        border-radius: 10px;
        min-height: 100px;
        color: #333;
        line-height: 1.5;
    }

    input, textarea {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        border-radius: 8px;
        border: 1px solid #d1d5db;
        font-size: 14px;
    }

    .form-btn {
        margin-top: 12px;
        width: 100%;
        background: #2563eb;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 500;
        transition: 0.3s;
    }

    .form-btn:hover {
        background: #1e40af;
    }

</style>
</head>

<body>

<div class="container">
    <h2>Centro de Atención 🛍️</h2>

    <div class="menu">
        <button onclick="mostrar('cuenta')">👤 Mi cuenta</button>
        <button onclick="mostrar('pedidos')">📦 Pedidos</button>
        <button onclick="mostrar('promo')">🔥 Promociones</button>
        <button onclick="mostrar('costos')">🚚 Costos</button>
        <button onclick="mostrar('error')">⚠️ Reportar error</button>
        <button onclick="mostrar('compra')">🛒 Compra</button>
        <button onclick="mostrar('cashback')">💰 Cashback</button>
    </div>

    <div class="content" id="contenido">
        Selecciona una opción del menú para recibir información.
    </div>
</div>

<script>
function mostrar(opcion) {
    let contenido = document.getElementById("contenido");

    switch(opcion) {

        case "cuenta":
            contenido.innerHTML = "👤 En tu cuenta encontrarás tus datos personales, así como el historial de tus pedidos.";
        break;

        case "pedidos":
            contenido.innerHTML = "📦 Puedes consultar todas tus compras desde tu perfil de usuario.";
        break;

        case "promo":
            contenido.innerHTML = "🔥 Consulta nuestras promociones en el menú principal de la tienda.";
        break;

        case "costos":
            contenido.innerHTML = "🚚 Las entregas por paquetería Casa Blanca CB no tienen costo ni compra mínima.";
        break;

        case "compra":
            contenido.innerHTML = "🛒 Todas tus compras están protegidas y garantizamos su entrega en perfectas condiciones.";
        break;

        case "error":
            contenido.innerHTML = `
                ⚠️ Describe el problema que presentas:<br>
                <textarea placeholder="Escribe aquí tu problema..."></textarea>
                <button class="form-btn">Enviar reporte</button>
            `;
        break;

        case "cashback":
            contenido.innerHTML = `
                💰 Solicita tu cashback:<br>
                <input type="text" placeholder="Nombre completo">
                <input type="email" placeholder="Correo electrónico">
                <input type="tel" placeholder="Número de teléfono">
                <button class="form-btn">Solicitar cashback</button>
            `;
        break;

    }
}
</script>

</body>
</html>
