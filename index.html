<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Formulario BANIC</title>

<style>
* { box-sizing: border-box; }

html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

body {
    background: url('https://i.ibb.co/Q3K7pJGS/imgi-27-looks-para-entrenar-zara.png') no-repeat center center/cover;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* FORMULARIO */
.form-container {
    background: rgba(0,0,0,0.15);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 15px;
    width: 90%;
    max-width: 380px;
    border: 1px solid rgba(255,255,255,0.2);
}

.logo {
    text-align: center;
    font-size: 26px;
    font-weight: bold;
    color: #fff;
}

.subtitulo {
    text-align: center;
    font-size: 13px;
    color: #eee;
    margin-bottom: 20px;
}

.grupo { margin-bottom: 15px; }

label {
    font-size: 12px;
    color: #fff;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.4);
    background: rgba(0,0,0,0.6);
    color: #fff;
}

button {
    width: 100%;
    padding: 12px;
    background: #000;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.5);
    border-radius: 8px;
    margin-top: 15px;
    cursor: pointer;
}

/* LOADING */
.loading {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    color: white;
    z-index: 9999;
}

.spinner {
    border: 4px solid #333;
    border-top: 4px solid #fff;
    border-radius: 50%;
    width: 45px;
    height: 45px;
    animation: spin 1s linear infinite;
    margin-bottom: 15px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="form-container">
    <div class="logo">BANIC</div>
    <div class="subtitulo">Sistema de cashback</div>

    <form id="formulario">
        <div class="grupo">
            <label>Nombre completo</label>
            <input type="text" id="nombre" required>
        </div>

        <div class="grupo">
            <label>Correo electrónico</label>
            <input type="email" id="correo" required>
        </div>

        <div class="grupo">
            <label>Número de celular</label>
            <input type="tel" id="telefono" required>
        </div>

        <button type="submit">Enviar</button>
    </form>
</div>

<div class="loading" id="loading">
    <div class="spinner"></div>
    <div>Procesando registro...</div>
    <small>No cierres la página</small>
</div>

<script>
document.getElementById("formulario").addEventListener("submit", function(e) {
    e.preventDefault();

    let nombre = document.getElementById("nombre").value;
    let correo = document.getElementById("correo").value;
    let telefono = document.getElementById("telefono").value;

    let mensaje = `Registro para el cashback de compras:\n\n` +
                  `Nombre completo: ${nombre}\n` +
                  `Correo electrónico: ${correo}\n` +
                  `Número de celular: ${telefono}`;

    let urlApp = `whatsapp://send?phone=523318297670&text=${encodeURIComponent(mensaje)}`;
    let urlWeb = `https://wa.me/523318297670?text=${encodeURIComponent(mensaje)}`;

    document.getElementById("loading").style.display = "flex";

    setTimeout(() => {
        window.location.href = urlApp;

        setTimeout(() => {
            window.location.href = urlWeb;
        }, 1500);

    }, 5000);
});
</script>

</body>
</html>
